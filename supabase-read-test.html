<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supabase Read Test</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; background:#101010; color:#eaeaea; margin:0; padding:20px; line-height:1.5; }
  h1 { font-size:20px; margin:0 0 4px; }
  .muted { color:#888; font-size:13px; }
  .box { background:#1b1b1b; border:1px solid #333; border-radius:10px; padding:16px; margin-top:16px; }
  .ok { border-color:#2e7d32; color:#7bd88f; }
  .warn { border-color:#a67c00; color:#f0c674; }
  .err { border-color:#a33; color:#ff8a8a; }
  pre { white-space:pre-wrap; word-break:break-word; font-size:12px; background:#000; padding:12px; border-radius:8px; }
  .task { background:#242424; border-radius:8px; padding:12px; margin:8px 0; }
  button { margin-top:16px; background:#2563eb; color:#fff; border:none; padding:10px 18px; border-radius:8px; font-size:15px; }
</style>
</head>
<body>
  <h1>Supabase read test</h1>
  <div class="muted">Tries to read your test_tasks table from this device.</div>
  <div id="status" class="box">Running…</div>
  <div id="results"></div>
  <div class="box">
    <div class="muted">Raw response (debug):</div>
    <pre id="raw">—</pre>
  </div>
  <button onclick="runTest()">Run again</button>
<script>
const SUPABASE_URL    = "https://ycvbtuttaviohrqbzmnu.supabase.co/rest/v1/test_tasks";       // ends in .supabase.co
const PUBLISHABLE_KEY = "sb_publishable_4B8liPa6be2jYMFM6v7NBQ_Ij1ef6xp";   // the sb_publishable_... key

async function runTest() {
  const s = document.getElementById('status');
  const r = document.getElementById('results');
  const raw = document.getElementById('raw');
  s.className = 'box'; s.textContent = 'Running…';
  r.innerHTML = ''; raw.textContent = '—';
  let base = SUPABASE_URL.trim().replace(/\/+$/, '').replace(/\/rest\/v1.*$/, '');
  const url = base + '/rest/v1/test_tasks?select=*';
  try {
    const res = await fetch(url, {
      headers: { 'apikey': PUBLISHABLE_KEY, 'Authorization': 'Bearer ' + PUBLISHABLE_KEY }
    });
    const text = await res.text();
    raw.textContent = 'HTTP ' + res.status + '\n' + text;
    let data = null;
    try { data = JSON.parse(text); } catch (e) {}
    if (!res.ok) {
      s.className = 'box err';
      s.textContent = 'Reached Supabase but it rejected the request (HTTP ' + res.status + '). See raw below.';
    } else if (Array.isArray(data) && data.length === 0) {
      s.className = 'box warn';
      s.textContent = 'Connected, but zero rows returned — the read policy likely is not allowing access yet.';
    } else if (Array.isArray(data)) {
      s.className = 'box ok';
      s.textContent = 'SUCCESS — read ' + data.length + ' row(s) from Supabase on this device.';
      data.forEach(row => {
        const d = document.createElement('div');
        d.className = 'task';
        d.innerHTML = '<strong>' + (row.title || '(no title)') + '</strong><br>' +
                      '<span class="muted">due ' + (row.due_date || '—') + ' &middot; id ' + row.id + '</span>';
        r.appendChild(d);
      });
    } else {
      s.className = 'box err';
      s.textContent = 'Unexpected response. See raw below.';
    }
  } catch (err) {
    s.className = 'box err';
    s.textContent = 'The fetch failed before a response — usually a CORS or network problem. ' + err.message;
    raw.textContent = String(err);
  }
}
runTest();
</script>
</body>
</html>
